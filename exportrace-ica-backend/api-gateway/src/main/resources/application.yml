server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/auth/**
        - id: lote-pesca-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/adaptadores/**,/api/v1/maestros/**
        - id: monitoreo-cold-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/calidad/**
        - id: certificacion-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orch/**,/api/v1/tramites/**

jwt:
  secret: ${JWT_SECRET:exporsan-ica-secret-jwt-security-key-2026-v1}
